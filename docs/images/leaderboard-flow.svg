<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330">
  <defs>
    <style>
      .box { fill: #0f172a; stroke: #334155; stroke-width: 2; rx: 10; }
      .box-light { fill: #0b1324; stroke: #334155; stroke-width: 2; rx: 10; }
      .label { fill: #e2e8f0; font: 12.5px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
      .title { fill: #f8fafc; font: 14px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-weight: 600; }
      .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
  </defs>

  <rect x="30" y="60" width="230" height="90" class="box" />
  <text x="145" y="98" class="title" text-anchor="middle">Public Prod</text>
  <text x="145" y="120" class="label" text-anchor="middle">GET /v1/games/:slug/leaderboards</text>

  <rect x="30" y="180" width="230" height="90" class="box" />
  <text x="145" y="218" class="title" text-anchor="middle">Public Dev</text>
  <text x="145" y="240" class="label" text-anchor="middle">GET /v1/games/dev/:slug/leaderboards</text>

  <rect x="300" y="120" width="220" height="100" class="box" />
  <text x="410" y="160" class="title" text-anchor="middle">BitStat API</text>
  <text x="410" y="180" class="label" text-anchor="middle">Resolve slug + env</text>

  <rect x="560" y="70" width="220" height="90" class="box-light" />
  <text x="670" y="108" class="title" text-anchor="middle">Public Registry</text>
  <text x="670" y="130" class="label" text-anchor="middle">public:games:prod|dev</text>

  <rect x="560" y="190" width="220" height="90" class="box-light" />
  <text x="670" y="228" class="title" text-anchor="middle">Leaderboards</text>
  <text x="670" y="250" class="label" text-anchor="middle">Redis ZSETs</text>

  <rect x="820" y="120" width="220" height="100" class="box" />
  <text x="930" y="160" class="title" text-anchor="middle">Response</text>
  <text x="930" y="180" class="label" text-anchor="middle">Ranked entries</text>

  <path d="M 260 105 L 300 150" class="arrow" marker-end="url(#arrow)" />
  <path d="M 260 225 L 300 190" class="arrow" marker-end="url(#arrow)" />
  <path d="M 520 155 L 560 115" class="arrow" marker-end="url(#arrow)" />
  <path d="M 520 185 L 560 235" class="arrow" marker-end="url(#arrow)" />
  <path d="M 780 170 L 820 170" class="arrow" marker-end="url(#arrow)" />
</svg>
